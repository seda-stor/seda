<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيدة ستور - الصفحة الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* التنسيقات العامة */
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        
        header { 
            background: #2c3e50; 
            color: white; 
            padding: 0.5rem; 
            text-align: center; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        header h1 { font-size: 1.3rem; margin: 2px 0; }
        header p { font-size: 0.75rem; margin: 0; opacity: 0.9; }

        .container { max-width: 1000px; margin: 10px auto; padding: 10px; }

        .search-container { max-width: 600px; margin: 15px auto; padding: 0 15px; display: flex; gap: 8px; }
        .search-input { flex: 1; padding: 10px 20px; border: 2px solid #ddd; border-radius: 30px; font-family: 'Cairo'; font-size: 0.95rem; outline: none; transition: 0.3s; }
        .search-input:focus { border-color: #2c3e50; }
        .search-btn { background: #2c3e50; color: white; border: none; padding: 0 20px; border-radius: 30px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .search-btn:hover { background: #1a252f; }

        /* تنسيق الأقسام */
        .category-wrapper { display: flex; justify-content: center; gap: 10px; padding: 12px; overflow-x: auto; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .category-item { padding: 6px 18px; background: #eee; border-radius: 20px; cursor: pointer; white-space: nowrap; transition: 0.3s; font-size: 0.9rem; }
        .category-item.active { background: #27ae60; color: white; }
        /* تمييز زر الخصومات */
        .category-item.sale-btn { border: 1px solid #e74c3c; color: #e74c3c; }
        .category-item.sale-btn.active { background: #e74c3c; color: white; }

        /* شبكة المنتجات */
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 15px; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); transition: 0.3s; cursor: pointer; display: flex; flex-direction: column; position: relative; }
        .product-card:hover { transform: translateY(-5px); }
        
        /* شريط الخصم */
        .discount-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e74c3c;
            color: white;
            padding: 4px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.8rem;
            z-index: 5;
        }

        .product-card img { width: 100%; height: 260px; object-fit: contain; background: #fff; padding: 10px; box-sizing: border-box; }

        /* الترتيب المطلوب: الاسم أولاً ثم الشرح */
        .product-info { padding: 15px; text-align: right; border-top: 1px solid #f1f1f1; }
        .product-info h3 { margin: 0; font-size: 1.1rem; color: #2c3e50; }
        .product-info small { color: #7f8c8d; display: block; margin-bottom: 8px; }
        .price { color: #e67e22; font-size: 1.15rem; font-weight: bold; margin: 8px 0; display: block; }
        .buy-btn { background: #27ae60; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; width: 100%; font-size: 1rem; font-weight: bold; }

        /* نافذة الطلب */
        #order-form-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; overflow-y: auto; padding: 10px; }
        .form-box { background: white; padding: 20px; border-radius: 15px; width: 100%; max-width: 480px; box-sizing: border-box; }
        #main-view { width: 100%; height: 320px; object-fit: contain; background: #fff; border-radius: 10px; border: 1px solid #eee; }
        .thumbs-grid { display: flex; justify-content: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .thumb-img { width: 60px; height: 60px; object-fit: contain; border: 2px solid #ddd; border-radius: 8px; cursor: pointer; background: #fff; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-family: 'Cairo'; }
        .close-btn { background: #c0392b; margin-top: 8px; }
    </style>
</head>
<body>

<header>
    <h1>صيدة ستور</h1>
    <p>تسوق بأمان - التوصيل لكل المحافظات</p>
</header>

<div class="search-container">
    <input type="text" id="search-input" class="search-input" placeholder="ابحث عن منتج..." onkeyup="searchProducts()">
    <button class="search-btn" onclick="searchProducts()">بحث</button>
</div>

<div class="category-wrapper" id="cat-list">
    <div class="category-item active">جاري التحميل...</div>
</div>

<div class="container">
    <div class="products-grid" id="products-list"></div>
</div>

<div id="order-form-container">
    <div class="form-box">
        <div class="gallery-container">
            <img id="main-view" src="" alt="صورة المنتج">
            <div class="thumbs-grid" id="thumb-list"></div>
        </div>
        <h2 id="product-name-display" style="margin: 15px 0 5px 0; font-size: 1.25rem; text-align: center;">تأكيد الطلب</h2>
        <input type="text" id="cust-name" placeholder="الاسم الكامل">
        <input type="tel" id="cust-phone" placeholder="رقم الهاتف">
        <select id="cust-city">
            <option value="بغداد">بغداد</option><option value="البصرة">البصرة</option><option value="الموصل">الموصل</option><option value="أربيل">أربيل</option><option value="النجف">النجف</option><option value="كربلاء">كربلاء</option><option value="واسط">واسط</option><option value="القادسية">القادسية</option><option value="ديالى">ديالى</option><option value="المثنى">المثنى</option><option value="الانبار">الانبار</option><option value="صلاح الدين">صلاح الدين</option><option value="دهوك">دهوك</option><option value="السليمانية">السليمانية</option><option value="ميسان">ميسان</option><option value="ذي قار">ذي قار</option><option value="كركوك">كركوك</option><option value="بابل">بابل</option>
        </select>
        <button class="buy-btn" onclick="confirmOrder()">إرسال الطلب عبر واتساب</button>
        <button class="buy-btn close-btn" onclick="closeForm()">إلغاء</button>
    </div>
</div>

<script>
    const products_api = "https://sheetdb.io/api/v1/wlqhpaeshgyev?sheet=Sheet1";
    const categories_api = "https://sheetdb.io/api/v1/wlqhpaeshgyev?sheet=Sheet2";
    let allProducts = [];
    let selectedProduct = "";

    async function loadCategories() {
        try {
            const res = await fetch(categories_api);
            const data = await res.json();
            const list = document.getElementById('cat-list');
            // إضافة زر "الكل" وزر "عروض" يدوياً
            let categoriesHTML = `<div class="category-item active" onclick="filterCat('الكل', this)">الكل</div>`;
            categoriesHTML += `<div class="category-item sale-btn" onclick="filterCat('عروض', this)">🔥 عروض خاصة</div>`;
            
            data.forEach(cat => {
                categoriesHTML += `<div class="category-item" onclick="filterCat('${cat.category_name}', this)">${cat.category_name}</div>`;
            });
            list.innerHTML = categoriesHTML;
        } catch (e) { console.error("خطأ بالأقسام"); }
    }

    async function loadProducts() {
        try {
            const res = await fetch(products_api);
            allProducts = await res.json();
            displayProducts(allProducts);
        } catch (e) { console.error("خطأ بالمنتجات"); }
    }

    function displayProducts(products) {
        const grid = document.getElementById('products-list');
        grid.innerHTML = '';
        if(products.length === 0) {
            grid.innerHTML = '<p style="text-align:center; width:100%; grid-column: 1/-1;">لا توجد منتجات حالياً.</p>';
            return;
        }
        products.forEach(item => {
            // شريط الخصم يظهر فقط إذا كان هناك قيمة في عمود discount
            let discountTag = (item.discount && item.discount !== "0" && item.discount !== "") 
                ? `<div class="discount-badge">خصم ${item.discount}</div>` : '';

            grid.innerHTML += `
                <div class="product-card" onclick="openOrderForm('${item.name}', '${item.image1}', '${item.image2}', '${item.image3}', '${item.image4}')">
                    ${discountTag}
                    <img src="${item.image1}" alt="${item.name}">
                    <div class="product-info">
                        <h3>${item.name}</h3>
                        <small>${item.category}</small>
                        <p class="price">${item.price} د.ع</p>
                        <button class="buy-btn">التفاصيل والطلب</button>
                    </div>
                </div>`;
        });
    }

    function filterCat(name, el) {
        document.getElementById('search-input').value = '';
        document.querySelectorAll('.category-item').forEach(btn => btn.classList.remove('active'));
        el.classList.add('active');

        if (name === 'الكل') {
            displayProducts(allProducts);
        } else if (name === 'عروض') {
            // تصفية المنتجات التي لديها خصم فقط
            const saleProducts = allProducts.filter(p => p.discount && p.discount !== "0" && p.discount !== "");
            displayProducts(saleProducts);
        } else {
            displayProducts(allProducts.filter(p => p.category === name));
        }
    }

    function searchProducts() {
        const term = document.getElementById('search-input').value.toLowerCase();
        const filtered = allProducts.filter(p => p.name.toLowerCase().includes(term) || p.category.toLowerCase().includes(term));
        displayProducts(filtered);
        document.querySelectorAll('.category-item').forEach(btn => btn.classList.remove('active'));
    }

    function openOrderForm(name, img1, img2, img3, img4) {
        selectedProduct = name;
        document.getElementById('product-name-display').innerText = name;
        const mainView = document.getElementById('main-view');
        mainView.src = img1;
        const thumbList = document.getElementById('thumb-list');
        thumbList.innerHTML = '';
        const images = [img1, img2, img3, img4];
        images.forEach(imgUrl => {
            if(imgUrl && imgUrl !== "" && imgUrl !== "undefined") {
                const thumb = document.createElement('img');
                thumb.src = imgUrl;
                thumb.className = 'thumb-img';
                thumb.onclick = (e) => { e.stopPropagation(); mainView.src = imgUrl; };
                thumbList.appendChild(thumb);
            }
        });
        document.getElementById('order-form-container').style.display = 'flex';
    }

    function closeForm() { document.getElementById('order-form-container').style.display = 'none'; }

    function confirmOrder() {
        const name = document.getElementById('cust-name').value;
        const phone = document.getElementById('cust-phone').value;
        const city = document.getElementById('cust-city').value;
        if (!name || !phone) { alert("يرجى إكمال البيانات عيوني"); return; }
        const msg = `طلب جديد من المتجر:\nالمنتج: ${selectedProduct}\nالاسم: ${name}\nالهاتف: ${phone}\nالمحافظة: ${city}`;
        window.open(`https://wa.me/9647711797380?text=${encodeURIComponent(msg)}`);
        closeForm();
    }

    loadCategories();
    loadProducts();
</script>
</body>
</html>
