<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيدة ستور - Seda Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
        
        header { 
            background: #2c3e50; 
            color: white; 
            padding: 10px; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
        }
        header h1 { font-size: 1.3rem; margin: 0; }

        #installBtn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 20px;
            font-family: 'Cairo';
            font-size: 0.8rem;
            cursor: pointer;
            display: none; /* مخفي حتى يدعم المتصفح PWA */
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .category-wrapper { display: flex; justify-content: flex-start; gap: 10px; padding: 15px; overflow-x: auto; background: white; white-space: nowrap; border-bottom: 1px solid #ddd; scrollbar-width: none; }
        .category-item { padding: 8px 20px; background: #eee; border-radius: 20px; cursor: pointer; flex-shrink: 0; font-size: 0.9rem; }
        .category-item.active { background: #27ae60; color: white; }
        .container { max-width: 1000px; margin: 10px auto; padding: 10px; }
        .search-container { max-width: 600px; margin: 15px auto; padding: 0 15px; display: flex; gap: 8px; }
        .search-input { flex: 1; padding: 10px 20px; border: 2px solid #ddd; border-radius: 30px; outline: none; width: 100%; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
        .product-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); position: relative; }
        .product-card img { width: 100%; height: 260px; object-fit: contain; padding: 10px; }
        .price { color: #e67e22; font-size: 1.15rem; font-weight: bold; }
        .buy-btn { background: #27ae60; color: white; border: none; padding: 10px; border-radius: 6px; width: 100%; cursor: pointer; }
        #order-form-container { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; }
        .form-box { background: white; padding: 15px; border-radius: 15px; width: 90%; max-height: 90vh; overflow-y: auto; }
        .media-container { width: 100%; height: auto; background: #000; border-radius: 10px; overflow: hidden; margin-bottom: 15px; }
        #main-view { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>

<body>

<header>
    <h1>صيدة ستور 🛍️</h1>
    <button id="installBtn">تثبيت التطبيق</button>
</header>

<div class="search-container">
    <input type="text" id="search-input" class="search-input" placeholder="ابحث عن منتج..." onkeyup="searchProducts()">
</div>

<div class="category-wrapper" id="cat-list"></div>

<div class="container">
    <div class="products-grid" id="products-list"></div>
</div>

<div id="order-form-container">
    <div class="form-box">
        <div class="media-container">
            <img id="main-view" src="">
            <iframe id="youtube-view" style="display:none;" src="" allowfullscreen></iframe>
        </div>
        <div id="thumb-list" style="display:flex; gap:5px; margin-bottom:10px;"></div>
        <h2 id="product-name-display" style="text-align:center;"></h2>
        <p id="modal-desc" style="text-align:center;"></p>
        <input type="tel" id="cust-phone" placeholder="رقم الموبايل" style="width:100%; padding:10px; margin:5px 0;">
        <select id="cust-city" style="width:100%; padding:10px; margin:5px 0;">
            <option value="بغداد">بغداد</option>
            <option value="البصرة">البصرة</option>
            </select>
        <button class="buy-btn" onclick="confirmOrder()">طلب عبر واتساب</button>
        <button class="buy-btn" style="background:#c0392b; margin-top:5px;" onclick="closeForm()">إغلاق</button>
    </div>
</div>

<script>
    // 1. تسجيل السيرفس وركر
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('service-worker.js');
        });
    }

    // 2. منطق زر التثبيت PWA
    let deferredPrompt;
    const installBtn = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        installBtn.style.display = 'block';

        installBtn.addEventListener('click', () => {
            installBtn.style.display = 'none';
            deferredPrompt.prompt();
            deferredPrompt.userChoice.then((choiceResult) => {
                deferredPrompt = null;
            });
        });
    });

    // 3. منطق المتجر (SheetDB)
    const products_api = "https://sheetdb.io/api/v1/wlqhpaeshgyev?sheet=Sheet1";
    let allProducts = [];

    async function init() {
        try {
            const res = await fetch(products_api);
            allProducts = await res.json();
            displayProducts(allProducts);
            // بناء التصنيفات بشكل مبسط
            const list = document.getElementById('cat-list');
            list.innerHTML = `<div class="category-item active" onclick="location.reload()">الكل</div>`;
        } catch (e) { console.error("Error"); }
    }

    function displayProducts(products) {
        const grid = document.getElementById('products-list');
        grid.innerHTML = products.map(item => `
            <div class="product-card" onclick='openOrderForm(${JSON.stringify(item)})'>
                <img src="${item.image1}">
                <div style="padding:15px; text-align:right;">
                    <h3>${item.name}</h3>
                    <p class="price">${item.price} د.ع</p>
                    <button class="buy-btn">التفاصيل والطلب</button>
                </div>
            </div>
        `).join('');
    }

    function openOrderForm(item) {
        document.getElementById('product-name-display').innerText = item.name;
        document.getElementById('main-view').src = item.image1;
        document.getElementById('order-form-container').style.display = 'flex';
    }

    function closeForm() { document.getElementById('order-form-container').style.display = 'none'; }

    init();
</script>

</body>
</html>
