<style>
    body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; margin: 0; padding: 0; }
    
    /* التعديل هنا لترتيب العنوان والزر بجانب بعضهما */

        color: white; 
        padding: 10px; 
        position: sticky; 
        top: 0;

    }

    /* تنسيق زر التثبيت */
    #installBtn {
        background: #27ae60;

        padding: 5px 12px;

        font-family: 'Cairo';

        0% { transform: scale(1); }

<body>

<header>
    <h1> صيدة ستور 🛍️ </h1>
</header>

<div class="search-container">
    <input type="text" id="search-input" class="search-input" placeholder="ابحث عن منتج..." onkeyup="searchProducts()">
</div>

<div class="category-wrapper" id="cat-list"></div>

<div class="container">
    <div class="products-grid" id="products-list"></div>
</div>

<div id="order-form-container">
    <div class="form-box">
        <div class="media-container">
            <img id="main-view" src="">
            <iframe id="youtube-view" style="display:none;" src="" allowfullscreen></iframe>
        </div>
        <div class="thumbs-grid" id="thumb-list"></div>
        <h2 id="product-name-display" style="text-align: center; margin-bottom: 5px;"></h2>
        <p id="modal-desc"></p> <input type="text" id="cust-details" placeholder="الكمية أو أي تفاصيل أخرى">
        <input type="tel" id="cust-phone" placeholder="رقم الموبايل">
        <select id="cust-city" required style="display: block; width: 100%;">
    <option value="" disabled selected>اختر المحافظة</option>
    <option value="بغداد">بغداد</option>
    <option value="البصرة">البصرة</option>
    <option value="الموصل">نينوى (الموصل)</option>
    <option value="أربيل">أربيل</option>
    <option value="النجف">النجف</option>
    <option value="كربلاء">كربلاء</option>
    <option value="بابل">بابل</option>
    <option value="ذي قار">ذي قار</option>
    <option value="الأنبار">الأنبار</option>
    <option value="كركوك">كركوك</option>
    <option value="صلاح الدين">صلاح الدين</option>
    <option value="ديالى">ديالى</option>
    <option value="واسط">واسط</option>
    <option value="ميسان">ميسان</option>
    <option value="القادسية">القادسية</option>
    <option value="المثنى">المثنى</option>
    <option value="السليمانية">السليمانية</option>
    <option value="دهوك">دهوك</option>
</select>


        <button class="buy-btn" onclick="confirmOrder()">طلب عبر واتساب</button>
        <button class="buy-btn close-btn" onclick="closeForm()">إغلاق</button>
    </div>
</div>

<script>
    const products_api = "https://sheetdb.io/api/v1/wlqhpaeshgyev?sheet=Sheet1";
    const categories_api = "https://sheetdb.io/api/v1/wlqhpaeshgyev?sheet=Sheet2";
    let allProducts = [];
    let selectedProduct = "";
    let selectedImg = "";

    function getYoutubeID(url) {
        if (!url) return null;
        const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
        const match = url.match(regExp);
        return (match && match[2].length === 11) ? match[2] : null;
    }

    async function init() {
        try {
            const [pRes, cRes] = await Promise.all([fetch(products_api), fetch(categories_api)]);
            allProducts = await pRes.json();
            const categories = await cRes.json();
            
            const list = document.getElementById('cat-list');
            let html = `<div class="category-item active" onclick="filterCat('الكل', this)">الكل</div>`;
            html += `<div class="category-item sale-btn" onclick="filterCat('عروض', this)">🔥 عروض خاصة</div>`;
            categories.forEach(c => { html += `<div class="category-item" onclick="filterCat('${c.category_name}', this)">${c.category_name}</div>`; });
            list.innerHTML = html;

            displayProducts(allProducts);
        } catch (e) { console.error("Error loading data"); }
    }

    function displayProducts(products) {
        const grid = document.getElementById('products-list');
        grid.innerHTML = products.map(item => {
            const hasDiscount = item.discount && item.discount !== "0" && item.discount !== "";
            return `
            <div class="product-card" onclick='openOrderForm(${JSON.stringify(item)})'>
                ${hasDiscount ? `<div class="discount-badge">خصم ${item.discount}</div>` : ''}
                <img src="${item.image1}">
                <div class="product-info">
                    <h3>${item.name}</h3>
                    <p class="product-desc">${item.description || ''}</p> <p class="price">${item.price} د.ع</p>
                    <button class="buy-btn">التفاصيل والطلب</button>
                </div>
            </div>`;
        }).join('');
    }

    function openOrderForm(item) {
        selectedProduct = item.name;
        selectedImg = item.image1;
        const mainView = document.getElementById('main-view');
        const ytView = document.getElementById('youtube-view');
        
        document.getElementById('product-name-display').innerText = item.name;
        document.getElementById('modal-desc').innerText = item.description || ''; // إظهار الوصف في النافذة
        mainView.src = item.image1;
        mainView.style.display = 'block';
        ytView.style.display = 'none';
        ytView.src = "";

        const thumbs = document.getElementById('thumb-list');
        thumbs.innerHTML = '';
        [item.image1, item.image2, item.image3, item.image4].forEach(img => {
            if(img && img !== "") {
                const i = document.createElement('img'); i.src = img; i.className = 'thumb-img';
                i.onclick = () => { mainView.src = img; mainView.style.display='block'; ytView.style.display='none'; ytView.src=""; };
                thumbs.appendChild(i);
            }
        });

        const ytID = getYoutubeID(item.video);
        if(ytID) {
            const vBtn = document.createElement('div'); vBtn.className = 'thumb-video-btn'; vBtn.innerHTML = '🎥';
            vBtn.onclick = () => {
                mainView.style.display = 'none';
                ytView.style.display = 'block';
                ytView.src = `https://www.youtube.com/embed/${ytID}?autoplay=1&origin=${window.location.origin}`;
            };
            thumbs.appendChild(vBtn);
        }

        document.getElementById('order-form-container').style.display = 'flex';
    }

    function closeForm() { 
        document.getElementById('order-form-container').style.display = 'none'; 
        document.getElementById('youtube-view').src = "";
    }

    function filterCat(name, el) {
        document.querySelectorAll('.category-item').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        if (name === 'الكل') displayProducts(allProducts);
        else if (name === 'عروض') displayProducts(allProducts.filter(p => p.discount && p.discount !== "0" && p.discount !== ""));
        else displayProducts(allProducts.filter(p => p.category === name));
    }

    function searchProducts() {
        const val = document.getElementById('search-input').value.toLowerCase();
        displayProducts(allProducts.filter(p => p.name.toLowerCase().includes(val)));
    }

    function confirmOrder() {
        const details = document.getElementById('cust-details').value;
        const phone = document.getElementById('cust-phone').value;
        const city = document.getElementById('cust-city').value;
        if(!phone) return alert("يرجى إدخال الهاتف");
        const msg = `طلب جديد 🛍️\nالمنتج: ${selectedProduct}\nالتفاصيل: ${details}\nالهاتف: ${phone}\nالمحافظة: ${city}\nالرابط: ${selectedImg}`;
        window.open(`https://wa.me/9647711797380?text=${encodeURIComponent(msg)}`);
    }

    init();
</script>
</body>
</html>
